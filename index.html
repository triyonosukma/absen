<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Shift Scheduler</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    font-family: Arial, sans-serif;
}

.sticky-col{
    position: sticky;
    left: 0;
    z-index: 10;
}

.table-wrapper{
    overflow:auto;
    max-height:70vh;
}

</style>

</head>

<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-white">

<!-- HEADER -->
<header class="bg-blue-600 text-white p-4 shadow-lg">

    <div class="flex justify-between items-center">

        <div>
            <h1 class="text-xl font-bold">
                Smart Shift Scheduler
            </h1>

            <p class="text-xs opacity-80">
                JSON GitHub Version
            </p>
        </div>

        <button id="btn-dark"
        class="bg-white/20 px-3 py-2 rounded-lg">

            <i class="fa-solid fa-moon"></i>

        </button>

    </div>

</header>

<!-- TOOLBAR -->
<section class="p-4">

    <div class="flex flex-wrap gap-2 mb-4">

        <button
        onclick="loadData()"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">

            Reload GitHub

        </button>

        <button
        onclick="downloadJSON()"
        class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm">

            Export JSON

        </button>

        <input
        type="text"
        id="search"
        placeholder="Cari nama..."
        class="border border-slate-300 px-3 py-2 rounded-lg text-sm">

    </div>

    <!-- DASHBOARD -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">

        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <div class="text-xs text-slate-500">
                Total Staff
            </div>

            <div id="total-staff"
            class="text-2xl font-bold">
                0
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <div class="text-xs text-slate-500">
                Shift Pagi
            </div>

            <div id="count-s1"
            class="text-2xl font-bold">
                0
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <div class="text-xs text-slate-500">
                Shift Siang
            </div>

            <div id="count-s2"
            class="text-2xl font-bold">
                0
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <div class="text-xs text-slate-500">
                Shift Malam
            </div>

            <div id="count-s3"
            class="text-2xl font-bold">
                0
            </div>
        </div>

    </div>

    <!-- TABLE -->
    <div class="table-wrapper bg-white dark:bg-slate-800 rounded-xl shadow">

        <table class="w-full border-collapse text-xs">

            <thead id="thead"
            class="bg-slate-200 dark:bg-slate-700 sticky top-0 z-20">

            </thead>

            <tbody id="tbody">

            </tbody>

        </table>

    </div>

</section>

<script>

const GITHUB_JSON =
'https://raw.githubusercontent.com/triyonosukma/absen/main/jadwal.json';

let generatedSchedule = null;

const SHIFT_COLOR = {

    '1':'bg-white text-black border',
    '2':'bg-yellow-400 text-black',
    '3':'bg-blue-600 text-white',
    'WFH1':'bg-green-200 text-black',
    'WFH2':'bg-green-400 text-black',
    'L':'bg-red-500 text-white',
    'C':'bg-pink-500 text-white',
    'NS':'bg-emerald-600 text-white'

};

async function loadData(){

    try{

        showToast('Mengambil data GitHub...');

        const response =
        await fetch(
            GITHUB_JSON + '?t=' + Date.now()
        );

        if(!response.ok){

            throw new Error('Gagal fetch');

        }

        generatedSchedule =
        await response.json();

        localStorage.setItem(
            'jadwal_cache',
            JSON.stringify(generatedSchedule)
        );

        renderTable();

        renderDashboard();

        showToast('Berhasil load data');

    }catch(err){

        console.error(err);

        showToast('GitHub gagal, load cache');

        let cache =
        localStorage.getItem('jadwal_cache');

        if(cache){

            generatedSchedule =
            JSON.parse(cache);

            renderTable();

            renderDashboard();
        }
    }
}

function renderDashboard(){

    let totalS1 = 0;
    let totalS2 = 0;
    let totalS3 = 0;

    generatedSchedule.data.forEach(emp=>{

        emp.schedule.forEach(s=>{

            if(s==='1') totalS1++;
            if(s==='2') totalS2++;
            if(s==='3') totalS3++;

        });

    });

    document.getElementById('total-staff')
    .innerText =
    generatedSchedule.data.length;

    document.getElementById('count-s1')
    .innerText =
    totalS1;

    document.getElementById('count-s2')
    .innerText =
    totalS2;

    document.getElementById('count-s3')
    .innerText =
    totalS3;

}

function renderTable(){

    const tbody =
    document.getElementById('tbody');

    const thead =
    document.getElementById('thead');

    tbody.innerHTML = '';
    thead.innerHTML = '';

    if(!generatedSchedule) return;

    let maxDays = 31;

    let header = `
    <tr>

        <th class="sticky-col bg-slate-200 dark:bg-slate-700 p-2 border">
            Nama
        </th>
    `;

    for(let d=1; d<=maxDays; d++){

        header += `
        <th class="p-2 border">
            ${d}
        </th>
        `;
    }

    header += '</tr>';

    thead.innerHTML = header;

    const keyword =
    document.getElementById('search')
    .value
    .toLowerCase();

    generatedSchedule.data
    .filter(emp =>
        emp.name.toLowerCase().includes(keyword)
    )
    .forEach(emp=>{

        let tr = `
        <tr>

            <td class="
            sticky-col
            bg-white
            dark:bg-slate-800
            p-2
            border
            font-bold
            ">
                ${emp.name}
            </td>
        `;

        emp.schedule.forEach((s,idx)=>{

            tr += `
            <td
            onclick="editShift('${emp.id}',${idx})"
            class="
            p-1
            border
            text-center
            cursor-pointer
            ">

                <div class="
                rounded
                px-1
                py-1
                text-[10px]
                font-bold
                ${SHIFT_COLOR[s] || 'bg-slate-200'}
                ">

                    ${s}

                </div>

            </td>
            `;
        });

        tr += '</tr>';

        tbody.innerHTML += tr;

    });

}

function editShift(empId, dayIndex){

    let newShift =
    prompt('Masukkan Shift Baru');

    if(!newShift) return;

    generatedSchedule.data.forEach(emp=>{

        if(emp.id === empId){

            emp.schedule[dayIndex] =
            newShift.toUpperCase();

        }

    });

    localStorage.setItem(
        'jadwal_cache',
        JSON.stringify(generatedSchedule)
    );

    renderTable();

    renderDashboard();

    showToast('Shift berhasil diubah');

}

function downloadJSON(){

    const blob =
    new Blob(
        [JSON.stringify(generatedSchedule,null,2)],
        {
            type:'application/json'
        }
    );

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement('a');

    a.href = url;

    a.download = 'jadwal.json';

    a.click();

}

function showToast(message){

    const toast =
    document.createElement('div');

    toast.className =
    'fixed top-4 right-4 bg-black text-white px-4 py-2 rounded-lg z-50';

    toast.innerText = message;

    document.body.appendChild(toast);

    setTimeout(()=>{

        toast.remove();

    },3000);

}

document.getElementById('search')
.addEventListener('input',renderTable);

document.getElementById('btn-dark')
.addEventListener('click',()=>{

    document.documentElement
    .classList
    .toggle('dark');

});

loadData();

</script>

</body>
</html>
